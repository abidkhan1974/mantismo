version: 2

project_name: mantismo

before:
  hooks:
    - go mod tidy

builds:
  - id: mantismo
    main: ./cmd/mantismo/
    binary: mantismo
    env:
      - CGO_ENABLED=0  # Pure-Go vault (modernc.org/sqlite + AES-256-GCM)
    goos:
      - darwin
      - linux
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"

brews:
  - repository:
      owner: abidkhan1974
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    homepage: "https://github.com/abidkhan1974/mantismo"
    description: "Eyes on every agent — a personal firewall for AI agents"
    license: "Apache-2.0"
    install: |
      bin.install "mantismo"
    test: |
      system "#{bin}/mantismo", "--version"
