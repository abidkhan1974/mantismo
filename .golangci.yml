version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck  # includes gosimple and stylecheck (merged in v2)
    - unused
    - misspell
    - gosec
  settings:
    gosec:
      excludes:
        - G104  # Unhandled errors (we'll handle explicitly)
        - G204  # Subprocess launched with tainted input — intentional by design (user-configured MCP command)

formatters:
  enable:
    - gofmt
    - goimports
