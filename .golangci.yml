version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck  # includes gosimple and stylecheck (merged in v2)
    - unused
    - misspell
    - gosec
  settings:
    errcheck:
      exclude-functions:
        # Close() errors in defer are standard Go idiom; not actionable once deferred
        - (io.Closer).Close
        # Temp dir cleanup failures don't affect correctness
        - os.RemoveAll
        # Terminal/stderr writes: errors not actionable (if terminal fails, can't report it)
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
    gosec:
      excludes:
        - G104  # Unhandled errors (we'll handle explicitly)
        - G204  # Subprocess launched with tainted input — intentional by design (user-configured MCP command)

formatters:
  enable:
    - gofmt
    - goimports
